<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil de Contacto Digital Premium</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        /* ================= ESTILOS GLOBALES ================= */
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f0f2f5;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .tarjeta {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            max-width: 400px;
            width: 100%;
            box-sizing: border-box;
        }
        h2 { 
            color: #b21f2d;
            margin-top: 0;
            text-align: center;
        }
        .campo {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 6px;
            font-size: 14px;
            color: #555;
        }
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 15px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #b21f2d;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover { 
            background-color: #921c25; 
        }
        #contenedor-qr {
            margin-top: 25px;
            display: flex;
            justify-content: center;
        }
        .oculto { 
            display: none !important; 
        }

        /* ================= ESTILOS ESPECÍFICOS DEL VISOR ================= */
        .visor-mode {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            margin: 0;
            padding: 0;
            background: #b21f2d;
            background: linear-gradient(180deg, rgba(178,31,45,0.7) 0%, rgba(255,255,255,1) 50%);
            min-height: 100vh;
        }

        .perfil-card {
            background: rgba(255,255,255,1);
            padding: 0;
            margin-top: 50px;
            border-radius: 20px;
            width: 350px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .perfil-header {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 30px;
        }

        .foto-perfil-marco {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            padding: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .foto-perfil-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .perfil-info {
            text-align: center;
            margin-top: 20px;
        }

        .perfil-nombre {
            font-size: 22px;
            font-weight: 700;
            color: #b21f2d;
            text-transform: uppercase;
            margin: 0;
        }

        .perfil-puesto {
            font-size: 14px;
            color: #b21f2d;
            margin: 5px 0 0 0;
            font-weight: 500;
        }

        .action-buttons {
            display: flex;
            gap: 20px;
            margin-top: 25px;
            margin-bottom: 25px;
        }

        .action-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid #b21f2d;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #b21f2d;
            font-size: 20px;
            background: white;
            cursor: default;
        }

        .data-card {
            background: #fff;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
            border-top: 1px solid #eee;
        }

        .data-item {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }

        .data-item-icon {
            color: #b21f2d;
            font-size: 18px;
            margin-right: 15px;
        }

        .data-item-content {
            display: flex;
            flex-direction: column;
        }

        .data-item-label {
            font-size: 11px;
            color: #aaa;
            text-transform: uppercase;
        }

        .data-item-value {
            font-size: 14px;
            color: #333;
            font-weight: 500;
            word-break: break-all;
        }

        .add-contact-btn {
            background-color: #b21f2d;
            color: white;
            width: 100%;
            border-radius: 0;
            font-size: 14px;
            padding: 15px;
            font-weight: 600;
            margin-top: auto;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
        }
        .add-contact-btn-icon {
            margin-right: 8px;
        }

        @import url('https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css');
    </style>
</head>
<body>

    <div id="seccion-generador" class="tarjeta">
        <h2>Crear Gafete Digital</h2>
        <p style="text-align: center; color: #666;">Ingresa los datos para generar el código QR:</p>
        
        <div class="campo">
            <label for="inputPhotoUrl">URL de Foto de Perfil:</label>
            <input type="text" id="inputPhotoUrl" placeholder="Enlace directo a la imagen">
        </div>

        <div class="campo">
            <label for="inputNombre">Nombre Completo:</label>
            <input type="text" id="inputNombre" placeholder="Nombre y apellidos">
        </div>

        <div class="campo">
            <label for="inputPuesto">Puesto y Código:</label>
            <input type="text" id="inputPuesto" placeholder="Cargo asignado">
        </div>

        <div class="campo">
            <label for="inputTelefono">Número de Teléfono:</label>
            <input type="tel" id="inputTelefono" placeholder="Número a 10 dígitos">
        </div>

        <div class="campo">
            <label for="inputEmail">Correo Electrónico:</label>
            <input type="email" id="inputEmail" placeholder="Dirección de correo">
        </div>

        <div class="campo">
            <label for="inputCompanyUrl">Sitio Web de la Empresa:</label>
            <input type="text" id="inputCompanyUrl" placeholder="Enlace de la página web">
        </div>

        <div class="campo">
            <label for="inputCompanyName">Razón Social y Puesto:</label>
            <input type="text" id="inputCompanyName" placeholder="Nombre de la empresa y cargo">
        </div>

        <button onclick="construirQR()">Generar Código QR</button>

        <div id="contenedor-qr"></div>
    </div>


    <div id="seccion-visor" class="visor-mode oculto">
        <div class="perfil-card">
            <div class="perfil-header">
                <div class="foto-perfil-marco">
                    <img id="vistaPhotoUrl" src="" class="foto-perfil-img" alt="Foto de perfil">
                </div>
                <div class="perfil-info">
                    <p id="vistaNombre" class="perfil-nombre"></p>
                    <p id="vistaPuesto" class="perfil-puesto"></p>
                </div>
            </div>

            <div class="action-buttons">
                <div class="action-btn"><i class="fas fa-phone"></i></div>
                <div class="action-btn"><i class="fas fa-envelope"></i></div>
            </div>

            <div class="data-card">
                <div class="data-item">
                    <div class="data-item-icon"><i class="fas fa-phone"></i></div>
                    <div class="data-item-content">
                        <span class="data-item-label">Teléfono</span>
                        <span id="vistaTelefono" class="data-item-value"></span>
                    </div>
                </div>
                <div class="data-item">
                    <div class="data-item-icon"><i class="fas fa-envelope"></i></div>
                    <div class="data-item-content">
                        <span class="data-item-label">E-mail</span>
                        <span id="vistaEmail" class="data-item-value"></span>
                    </div>
                </div>
                <div class="data-item">
                    <div class="data-item-icon"><i class="fas fa-globe"></i></div>
                    <div class="data-item-content">
                        <span class="data-item-label">Sitio Web</span>
                        <span id="vistaCompanyUrl" class="data-item-value"></span>
                    </div>
                </div>
                <div class="data-item">
                    <div class="data-item-icon"><i class="fas fa-building"></i></div>
                    <div class="data-item-content">
                        <span class="data-item-label">Empresa</span>
                        <span id="vistaCompanyName" class="data-item-value"></span>
                    </div>
                </div>
            </div>

            <button class="add-contact-btn"><i class="fas fa-user-plus add-contact-btn-icon"></i> Añadir contacto</button>
        </div>
    </div>

    <script>
        window.onload = function() {
            let parametros = new URLSearchParams(window.location.search);
            
            if (parametros.has('n')) {
                document.getElementById('vistaNombre').innerText = parametros.get('n');
                document.getElementById('vistaPuesto').innerText = parametros.get('p');
                document.getElementById('vistaTelefono').innerText = parametros.get('t');
                document.getElementById('vistaEmail').innerText = parametros.get('e');
                document.getElementById('vistaCompanyUrl').innerText = parametros.get('cu');
                document.getElementById('vistaCompanyName').innerText = parametros.get('cn');
                
                let photoUrl = parametros.get('ph');
                let photoImg = document.getElementById('vistaPhotoUrl');
                if (photoUrl && photoUrl !== "") {
                    photoImg.src = photoUrl;
                } else {
                    photoImg.src = "https://cdn.icon-icons.com/icons2/1378/PNG/512/avatardefault_92824.png";
                }

                document.getElementById('seccion-generador').classList.add('oculto');
                document.getElementById('seccion-visor').classList.remove('oculto');
                document.body.style.backgroundColor = "transparent";
            }
        };

        function construirQR() {
            let photoUrl = document.getElementById('inputPhotoUrl').value;
            let nombre = document.getElementById('inputNombre').value;
            let puesto = document.getElementById('inputPuesto').value;
            let telefono = document.getElementById('inputTelefono').value;
            let email = document.getElementById('inputEmail').value;
            let companyUrl = document.getElementById('inputCompanyUrl').value;
            let companyName = document.getElementById('inputCompanyName').value;

            let contenedor = document.getElementById('contenedor-qr');
            contenedor.innerHTML = "";

            if (nombre.trim() === "" || puesto.trim() === "" || telefono.trim() === "" || email.trim() === "" || companyUrl.trim() === "" || companyName.trim() === "" ) {
                alert("Por favor, llena todos los campos obligatorios antes de continuar.");
                return;
            }

            let urlLimpia = window.location.href.split('?')[0];

            let urlConDatos = `${urlLimpia}?ph=${encodeURIComponent(photoUrl)}&n=${encodeURIComponent(nombre)}&p=${encodeURIComponent(puesto)}&t=${encodeURIComponent(telefono)}&e=${encodeURIComponent(email)}&cu=${encodeURIComponent(companyUrl)}&cn=${encodeURIComponent(companyName)}`;

            new QRCode(contenedor, {
                text: urlConDatos,
                width: 250,
                height: 250,
                colorDark : "#b21f2d",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });
        }
    </script>

</body>
</html>
